name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      HUGO_VERSION: 0.161.0

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # ✅ Go is REQUIRED for Hugo Modules
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Verify Go
        run: go version

      # ✅ Cache BOTH Hugo resources + Go modules
      - name: Cache Hugo + Go
        uses: actions/cache@v4
        with:
          path: |
            resources
            ~/.cache/hugo
            ~/go/pkg/mod
          key: hugo-${{ hashFiles('go.sum', '**/*.md', '**/*.html', '**/*.scss', '**/*.js') }}
          restore-keys: |
            hugo-

      # ✅ Install Hugo manually (no Node dependency)
      - name: Install Hugo
        run: |
          wget https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz
          tar -xzf hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/hugo

      - name: Verify Hugo
        run: hugo version

      # 🧪 Force module download (helps debugging hangs)
      - name: Hugo Modules Init
        run: |
          hugo mod tidy
          hugo mod graph

      # 🧪 Debug-friendly build
      - name: Build
        run: |
          date
          hugo --minify --gc --logLevel debug --templateMetrics --templateMetricsHints --printMemoryUsage
          date

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
          clean: true
          single-commit: true
